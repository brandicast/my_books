services:
  backend:
    restart: always
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./data:/app/data
    environment:
      - PORT=3001
      - DB_PATH=/app/data/database.sqlite

  frontend:
    restart: always
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5555:5555"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - ./data:/app/data
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_URL=http://localhost:3001

  nport:
    restart: always
    build:
      context: ./nport
      dockerfile: Dockerfile
    # Use host network so it can access localhost:5555 where frontend is exposed
    network_mode: host
    depends_on:
      - frontend
